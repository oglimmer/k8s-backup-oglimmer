{{- if .Values.viewer.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: backup-viewer-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backup2.labels" . | nindent 4 }}
    app.kubernetes.io/component: viewer
spec:
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: viewer
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
{{- end }}
