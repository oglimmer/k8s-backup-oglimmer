# Non-secret backup configuration + the age public recipient. Injected into the CronJob via envFrom.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backup2.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backup2.labels" . | nindent 4 }}
data:
  AGE_RECIPIENT: {{ .Values.ageRecipient | quote }}
  {{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
