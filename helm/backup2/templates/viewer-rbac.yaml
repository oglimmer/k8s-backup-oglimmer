{{- if .Values.viewer.enabled }}
# Viewer: read jobs/pods/logs, and create jobs for the "Run backup now" button.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-viewer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backup2.labels" . | nindent 4 }}
    app.kubernetes.io/component: viewer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-viewer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backup2.labels" . | nindent 4 }}
    app.kubernetes.io/component: viewer
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-viewer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backup2.labels" . | nindent 4 }}
    app.kubernetes.io/component: viewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backup-viewer
subjects:
  - kind: ServiceAccount
    name: backup-viewer
    namespace: {{ .Release.Namespace }}
{{- end }}
