{{- if and .Values.viewer.enabled .Values.ingress.enabled }}
# OIDC SSO is enforced by the Traefik middleware referenced below. That Middleware carries the
# Keycloak clientSecret, so it is applied out-of-band (oidc-middleware.example.yaml) and is not part
# of this chart — keeping the chart free of secrets.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backup-viewer-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backup2.labels" . | nindent 4 }}
    app.kubernetes.io/component: viewer
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer | quote }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Values.ingress.oidcMiddleware | quote }}
spec:
  tls:
    - secretName: {{ .Values.ingress.tlsSecretName | quote }}
      hosts:
        - {{ .Values.ingress.host | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: backup-viewer-service
                port:
                  number: 80
{{- end }}
