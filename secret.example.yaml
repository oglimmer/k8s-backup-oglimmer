# TEMPLATE ONLY — commit this file, never the filled-in copy.
#
#   1. cp secret.example.yaml secret.yaml   (secret.yaml is git-ignored)
#   2. fill in the real values
#   3. kubectl apply -f secret.yaml         (applied out-of-band; ArgoCD does not manage it)
#
# The real Secret lives only in the cluster and on the operator's machine, never in this public repo.
apiVersion: v1
kind: Secret
metadata:
  name: backup-secrets
  namespace: default
type: Opaque
stringData:
  # --- CouchDB: one JSON array of per-app credentials (single line) ---
  COUCHDB_TARGETS: >-
    [
      {"db":"blackjack","user":"blackjack-app","pass":"REPLACE"},
      {"db":"citybuilder","user":"citybuilder-app","pass":"REPLACE"},
      {"db":"cyc","user":"cyc-app","pass":"REPLACE"},
      {"db":"linky","user":"linky-app","pass":"REPLACE"},
      {"db":"linky_archive","user":"linky-app","pass":"REPLACE"},
      {"db":"swlcg","user":"swlcg-app","pass":"REPLACE"},
      {"db":"toldyouso","user":"toldyouso-app","pass":"REPLACE"}
    ]

  # --- MariaDB / Postgres root credentials ---
  MARIADB_ROOT_PASSWORD: "REPLACE"
  POSTGRES_PASSWORD: "REPLACE"

  # --- rclone Google Drive OAuth (from `rclone authorize "drive"`) ---
  # Full JSON token blob printed by `rclone authorize`, e.g. {"access_token":"...","refresh_token":"...",...}
  RCLONE_CONFIG_GDRIVE_TOKEN: 'REPLACE'
  # CLIENT_ID / CLIENT_SECRET are OPTIONAL — only set them if you authorized with your OWN Google
  # OAuth client. A plain `rclone authorize "drive"` uses rclone's built-in client; in that case
  # leave both UNSET so the config uses that same default client (setting a wrong pair breaks refresh).
  # RCLONE_CONFIG_GDRIVE_CLIENT_ID: "REPLACE"
  # RCLONE_CONFIG_GDRIVE_CLIENT_SECRET: "REPLACE"
  # Google Drive folder ID to store backups in (from the folder URL)
  RCLONE_CONFIG_GDRIVE_ROOT_FOLDER_ID: "REPLACE"
